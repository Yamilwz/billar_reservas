<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin  Gestión de Reservas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navPlaceholder"></div>

<div class="page-hero">
  <div class="container-fluid px-4">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
      <div>
        <h1 class="page-title">Gestión de Reservas</h1>
        <p class="page-subtitle mt-1">Filtra y gestiona todas las reservas del salón</p>
      </div>
      <div class="d-flex align-items-center gap-3 flex-wrap">
        <input type="date" id="dateFilter" class="form-control-dark" onchange="loadAllReservations()">
        <button class="btn-outline-custom" onclick="loadAllReservations()">
          Actualizar
        </button>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid px-4 py-4">
  <!-- KPIs row -->
  <div class="row g-3 mb-4" id="kpiRow">
    <div class="col-md-3 col-6">
      <div class="kpi-card green">
        <div class="kpi-icon"></div>
        <div class="kpi-value" id="kpiTotal"></div>
        <div class="kpi-label">Total del día</div>
      </div>
    </div>
    <div class="col-md-3 col-6">
      <div class="kpi-card gold">
        <div class="kpi-icon"></div>
        <div class="kpi-value" id="kpiPending"></div>
        <div class="kpi-label">Pendientes</div>
      </div>
    </div>
    <div class="col-md-3 col-6">
      <div class="kpi-card blue">
        <div class="kpi-icon"></div>
        <div class="kpi-value" id="kpiCompleted"></div>
        <div class="kpi-label">Completadas</div>
      </div>
    </div>
    <div class="col-md-3 col-6">
      <div class="kpi-card">
        <div class="kpi-icon"></div>
        <div class="kpi-value" id="kpiCancelled"></div>
        <div class="kpi-label">Canceladas</div>
      </div>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="admin-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Cliente</th>
          <th>Mesa</th>
          <th>Horario</th>
          <th>Total</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="resBody">
        <tr><td colspan="7" class="text-center py-4" style="color:var(--text-400)">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  checkAuth('admin');
  document.getElementById('navPlaceholder').innerHTML = renderAdminNav('admin_reservations');
  document.getElementById('dateFilter').value = new Date().toISOString().split('T')[0];

  async function loadAllReservations() {
    const date = document.getElementById('dateFilter').value;
    const tbody = document.getElementById('resBody');
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4" style="color:var(--text-400)"><span class="spinner-border spinner-border-sm me-2"></span>Cargando...</td></tr>';

    try {
      const res = await api.reservations.getAll(date);

      // KPIs
      document.getElementById('kpiTotal').textContent     = res.length;
      document.getElementById('kpiPending').textContent   = res.filter(r => r.status === 'pendiente').length;
      document.getElementById('kpiCompleted').textContent = res.filter(r => r.status === 'completada').length;
      document.getElementById('kpiCancelled').textContent = res.filter(r => r.status === 'cancelada').length;

      if (res.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5" style="color:var(--text-400)">No hay reservas para esta fecha</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      res.forEach(r => {
        let actionHtml;
        if (r.status === 'completada') {
          actionHtml = `<span class="badge-custom badge-cobrada">Mesa cobrada</span>`;
        } else if (r.status === 'cancelada') {
          actionHtml = `<span class="badge-custom badge-cancelada">Cancelada</span>`;
        } else {
          actionHtml = `
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-success" onclick="confirmComplete(${r.id}, this)">
                Cobrar
              </button>
              <button class="btn btn-sm btn-danger" onclick="cancelReservation(${r.id}, this)">
                
              </button>
            </div>`;
        }

        let statusBadge;
        if      (r.status === 'pendiente')  statusBadge = `<span class="badge-custom badge-pendiente">Pendiente</span>`;
        else if (r.status === 'completada') statusBadge = `<span class="badge-custom badge-completada">Completada</span>`;
        else                                 statusBadge = `<span class="badge-custom badge-cancelada">Cancelada</span>`;

        tbody.innerHTML += `
          <tr>
            <td style="color:var(--text-400);font-size:.8rem">#${r.id}</td>
            <td>
              <div style="font-weight:600">${r.user_name}</div>
            </td>
            <td><span style="color:var(--primary);font-weight:700">Mesa ${r.table_number}</span></td>
            <td style="font-size:.88rem">
              
              ${r.start_time.substring(0,5)}  ${r.end_time.substring(0,5)}
            </td>
            <td style="color:var(--gold);font-weight:700">$${parseFloat(r.total_price || 0).toFixed(2)}</td>
            <td>${statusBadge}</td>
            <td>${actionHtml}</td>
          </tr>`;
      });
    } catch (error) {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4"><div class="alert-dark-danger d-inline-block">${error.message}</div></td></tr>`;
    }
  }

  async function confirmComplete(id, btn) {
    if (!confirm('¿Confirmar cobro de esta mesa?\n\nEl monto se enviará automáticamente a Finanzas y no se podrá revertir.')) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    try {
      await api.reservations.updateStatus(id, 'completada');
      loadAllReservations();
      showToast('Mesa cobrada y enviada a Finanzas ');
    } catch (e) {
      alert(e.message);
      btn.disabled = false;
    }
  }

  async function cancelReservation(id, btn) {
    if (!confirm('¿Cancelar esta reserva?')) return;
    btn.disabled = true;
    try {
      await api.reservations.updateStatus(id, 'cancelada');
      loadAllReservations();
    } catch (e) {
      alert(e.message);
    }
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:24px;right:24px;background:var(--bg-700);border:1px solid var(--primary);color:var(--primary);padding:14px 22px;border-radius:12px;font-weight:600;font-size:.9rem;box-shadow:var(--shadow);z-index:9999;animation:slideUp .3s ease`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  loadAllReservations();
</script>
</body>
</html>
