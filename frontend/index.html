<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billar Hall  Reserva tu Mesa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/index.html"> BILLAR HALL</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navMain">
      <ul class="navbar-nav gap-1" id="auth-links">
        <li class="nav-item"><a class="nav-link" href="/login.html">Iniciar Sesión</a></li>
        <li class="nav-item"><a class="nav-link" href="/register.html">Registrarse</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="page-hero">
  <div class="container">
    <h1 class="page-title">Mapa de Mesas</h1>
    <p class="page-subtitle mt-1">Selecciona una fecha para ver disponibilidad en tiempo real</p>
    <div class="mt-3 d-flex align-items-center gap-3 flex-wrap">
      <input type="date" id="date-picker" class="form-control-dark" style="width:200px" onchange="loadTables()">
      <div class="d-flex gap-3 align-items-center">
        <span class="d-flex align-items-center gap-1" style="font-size:.82rem; color:var(--primary)"><span style="width:10px;height:10px;background:var(--primary);border-radius:50%;display:inline-block"></span> Disponible</span>
        <span class="d-flex align-items-center gap-1" style="font-size:.82rem; color:var(--danger)"><span style="width:10px;height:10px;background:var(--danger);border-radius:50%;display:inline-block"></span> Ocupada</span>
        <span class="d-flex align-items-center gap-1" style="font-size:.82rem; color:var(--gold)"><span style="width:10px;height:10px;background:var(--gold);border-radius:50%;display:inline-block"></span> Mantenimiento</span>
      </div>
    </div>
  </div>
</div>

<!-- TABLES GRID -->
<div class="container py-5">
  <div class="row g-4" id="tables-container">
    <!-- skeleton loaders -->
    <div class="col-md-4 col-sm-6"><div class="table-card" style="height:280px; background: linear-gradient(90deg, var(--bg-700) 25%, var(--bg-800) 50%, var(--bg-700) 75%); background-size:400% 100%; animation: shimmer 1.5s infinite linear;"></div></div>
    <div class="col-md-4 col-sm-6"><div class="table-card" style="height:280px; background: linear-gradient(90deg, var(--bg-700) 25%, var(--bg-800) 50%, var(--bg-700) 75%); background-size:400% 100%; animation: shimmer 1.5s infinite linear 0.2s;"></div></div>
    <div class="col-md-4 col-sm-6"><div class="table-card" style="height:280px; background: linear-gradient(90deg, var(--bg-700) 25%, var(--bg-800) 50%, var(--bg-700) 75%); background-size:400% 100%; animation: shimmer 1.5s infinite linear 0.4s;"></div></div>
  </div>
</div>

<style>
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
</style>

<!-- RESERVATION MODAL -->
<div class="modal fade" id="reserveModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          
          Reservar Mesa <span id="modal-table-num" class="text-success"></span>
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <!-- Reserved slots -->
        <div id="reserved-slots-container" class="mb-4 d-none">
          <p class="form-label mb-2">Horarios ya reservados:</p>
          <div id="reserved-slots-list" class="d-flex flex-wrap gap-1"></div>
        </div>

        <form id="reserveForm">
          <input type="hidden" id="tableId">
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">Hora de Inicio</label>
              <input type="time" id="startTime" class="form-control-dark w-100" required>
            </div>
            <div class="col-6">
              <label class="form-label">Hora de Fin</label>
              <input type="time" id="endTime" class="form-control-dark w-100" required>
            </div>
          </div>
          <div id="reserveError" class="alert-dark-danger mt-3 d-none"></div>
          <button type="submit" class="btn-primary-custom w-100 mt-4">
            Confirmar Reserva
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/map.js"></script>
</body>
</html>
