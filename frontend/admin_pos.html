<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin  POS / Tienda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navPlaceholder"></div>

<div class="page-hero">
  <div class="container-fluid px-4">
    <h1 class="page-title">Punto de Venta</h1>
    <p class="page-subtitle mt-1">Registra ventas y el stock se actualiza automáticamente</p>
  </div>
</div>

<div class="container-fluid px-4 py-4">
  <div class="row g-4">

    <!-- Products -->
    <div class="col-md-8">
      <div class="date-filter-bar mb-3">
        
        <input type="text" id="searchProd" class="form-control-dark flex-grow-1" placeholder="Buscar producto..." oninput="filterProducts()">
      </div>
      <div class="row g-3" id="productsGrid"></div>
    </div>

    <!-- Cart -->
    <div class="col-md-4">
      <div class="cart-panel">
        <div class="cart-header">
          <h5 class="fw-bold mb-0">Orden de Venta</h5>
          <p style="font-size:.8rem; color:var(--text-400); margin-top:4px">Haz clic en los productos para agregar</p>
        </div>
        <div class="cart-items" id="cartList">
          <div class="text-center py-5" style="color:var(--text-400)">
            
            Carrito vacío
          </div>
        </div>
        <div class="cart-footer">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <span style="color:var(--text-400); font-size:.9rem">Total a cobrar</span>
            <span id="cartTotal" style="font-size:1.8rem; font-weight:800; color:var(--primary)">$0.00</span>
          </div>
          <button class="btn-primary-custom w-100 mb-2" onclick="processSale()" id="checkoutBtn">
            Procesar Venta
          </button>
          <button class="btn-outline-custom w-100" onclick="clearCart()">
            Vaciar carrito
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  checkAuth('admin');
  document.getElementById('navPlaceholder').innerHTML = renderAdminNav('admin_pos');

  let allProducts = [];
  let cart = [];

  async function loadProducts() {
    try {
      allProducts = await api.products.getAll();
      renderProducts(allProducts);
    } catch (e) { alert(e.message); }
  }

  function renderProducts(products) {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = '';
    products.forEach(p => {
      const out = p.stock <= 0;
      const stockColor = p.stock < 5 ? 'var(--danger)' : 'var(--text-400)';
      grid.innerHTML += `
        <div class="col-6 col-xl-3">
          <div class="product-tile ${out ? 'out-of-stock' : ''}" onclick="${out ? '' : `addToCart(${p.id})`}">
            <div class="product-name">${p.name}</div>
            <div class="product-price">Bs ${parseFloat(p.price).toFixed(2)}</div>
            <div class="product-stock" style="color:${stockColor}">
              ${out ? 'Sin stock' : `${p.stock} en stock`}
            </div>
          </div>
        </div>`;
    });
  }

  function filterProducts() {
    const q = document.getElementById('searchProd').value.toLowerCase();
    renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
  }

  function addToCart(id) {
    const product = allProducts.find(p => p.id === id);
    if (!product) return;
    const existing = cart.find(c => c.product_id === id);
    if (existing) {
      if (existing.quantity >= product.stock) { showToast('Sin stock suficiente', 'error'); return; }
      existing.quantity++;
    } else {
      cart.push({ product_id: product.id, name: product.name, price: product.price, quantity: 1 });
    }
    renderCart();
  }

  function removeFromCart(index) {
    cart.splice(index, 1);
    renderCart();
  }

  function clearCart() {
    cart = [];
    renderCart();
  }

  function renderCart() {
    const list = document.getElementById('cartList');
    if (cart.length === 0) {
      list.innerHTML = '<div class="text-center py-5" style="color:var(--text-400)">Carrito vacío</div>';
      document.getElementById('cartTotal').textContent = 'Bs 0.00';
      return;
    }
    let total = 0;
    list.innerHTML = cart.map((item, i) => {
      const sub = item.price * item.quantity;
      total += sub;
      return `
        <div class="cart-item">
          <div>
            <div style="font-weight:600; font-size:.9rem">${item.name}</div>
            <div style="font-size:.78rem; color:var(--text-400)">Bs ${item.price} × ${item.quantity}</div>
          </div>
          <div class="d-flex align-items-center gap-2">
            <span style="color:var(--primary); font-weight:700; font-size:.9rem">Bs ${sub.toFixed(2)}</span>
            <button onclick="removeFromCart(${i})" style="background:none;border:none;color:var(--danger);font-size:1rem;cursor:pointer;line-height:1;">
              
            </button>
          </div>
        </div>`;
    }).join('');
    document.getElementById('cartTotal').textContent = `Bs ${total.toFixed(2)}`;
  }

  async function processSale() {
    if (cart.length === 0) { showToast('El carrito está vacío', 'error'); return; }
    const btn = document.getElementById('checkoutBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Procesando...';
    try {
      await api.sales.create({ items: cart.map(c => ({ product_id: c.product_id, quantity: c.quantity })) });
      clearCart();
      loadProducts();
      showToast(' Venta registrada con éxito');
    } catch (e) {
      showToast(e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Procesar Venta';
    }
  }

  function showToast(msg, type = 'success') {
    const t = document.createElement('div');
    const c = type === 'success' ? 'var(--primary)' : 'var(--danger)';
    t.style.cssText = `position:fixed;bottom:24px;right:24px;background:var(--bg-700);border:1px solid ${c};color:${c};padding:14px 22px;border-radius:12px;font-weight:600;font-size:.9rem;box-shadow:var(--shadow);z-index:9999;animation:slideUp .3s ease`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  loadProducts();
</script>
</body>
</html>
