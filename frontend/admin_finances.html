<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Finanzas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navPlaceholder"></div>

<div class="page-hero">
  <div class="container-fluid px-4">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
      <div>
        <h1 class="page-title">Finanzas &amp; Cuadre de Caja</h1>
        <p class="page-subtitle mt-1">Registro de ventas diarias y control financiero</p>
      </div>
      <div class="d-flex gap-3 align-items-center">
        <input type="date" id="dateFilter" class="form-control-dark" onchange="loadFinances()">
        <button class="btn-outline-custom" onclick="loadFinances()">Actualizar</button>
        <button class="btn-primary-custom" onclick="exportToCSV()" id="exportBtn" style="background:linear-gradient(135deg,#1a7a4a,#22a05a)">⬇ Exportar Excel</button>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid px-4 py-4">
  <div class="row g-3 mb-4">
    <div class="col-md-4 col-6">
      <div class="kpi-card green">
        <div class="kpi-icon"></div>
        <div class="kpi-value" id="totalSales">Bs 0.00</div>
        <div class="kpi-label">Total del día</div>
      </div>
    </div>
    <div class="col-md-4 col-6">
      <div class="kpi-card gold">
        <div class="kpi-icon"></div>
        <div class="kpi-value" id="totalTx">0</div>
        <div class="kpi-label">Transacciones</div>
      </div>
    </div>
    <div class="col-md-4 col-6">
      <div class="kpi-card blue">
        <div class="kpi-icon"></div>
        <div class="kpi-value" id="avgSale">Bs 0.00</div>
        <div class="kpi-label">Promedio por venta</div>
      </div>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="admin-table">
      <thead>
        <tr><th>#</th><th>Fecha y Hora</th><th>Cajero</th><th>Detalle</th><th>Total</th><th>Tipo</th></tr>
      </thead>
      <tbody id="salesBody">
        <tr><td colspan="6" class="text-center py-4" style="color:var(--text-400)">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  checkAuth('admin');
  document.getElementById('navPlaceholder').innerHTML = renderAdminNav('admin_finances');
  document.getElementById('dateFilter').value = new Date().toISOString().split('T')[0];

  // Variable en memoria para exportar sin depender del DOM
  let currentSalesData = [];

  async function loadFinances() {
    const date  = document.getElementById('dateFilter').value;
    const tbody = document.getElementById('salesBody');
    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4" style="color:var(--text-400)"><span class="spinner-border spinner-border-sm me-2"></span>Cargando...</td></tr>';
    try {
      const data  = await api.sales.getDaily(date);
      const total = parseFloat(data.total || 0);
      const count = data.sales.length;

      // Guardar en memoria para el exportador
      currentSalesData = data.sales;

      document.getElementById('totalSales').textContent = `Bs ${total.toFixed(2)}`;
      document.getElementById('totalTx').textContent    = count;
      document.getElementById('avgSale').textContent    = count > 0 ? `Bs ${(total/count).toFixed(2)}` : 'Bs 0.00';

      if (count === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5" style="color:var(--text-400)">Sin ventas para este día</td></tr>';
        return;
      }
      tbody.innerHTML = '';
      data.sales.forEach(s => {
        const isRes  = s.description && s.description.toLowerCase().includes('reserva');
        const badge  = isRes
          ? `<span class="badge-custom badge-completada">Reserva</span>`
          : `<span class="badge-custom" style="color:var(--blue);border-color:rgba(79,195,247,.3);background:rgba(79,195,247,.1)">POS</span>`;
        tbody.innerHTML += `
          <tr>
            <td style="color:var(--text-400);font-size:.8rem">#${s.id}</td>
            <td style="font-size:.88rem">${new Date(s.sale_date).toLocaleString('es-BO')}</td>
            <td>${s.admin_name || ''}</td>
            <td style="font-size:.82rem;color:var(--text-200);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.description||''}">${s.description||'Venta general'}</td>
            <td style="color:var(--gold);font-weight:700">Bs ${parseFloat(s.total_amount).toFixed(2)}</td>
            <td>${badge}</td>
          </tr>`;
      });
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4"><div class="alert-dark-danger d-inline-block">${e.message}</div></td></tr>`;
    }
  }
  loadFinances();

  function exportToCSV() {
    if (!currentSalesData || currentSalesData.length === 0) {
      alert('No hay datos para exportar. Carga las finanzas del día primero.');
      return;
    }
    const date = document.getElementById('dateFilter').value;
    const headers = ['#', 'Fecha y Hora', 'Cajero', 'Detalle', 'Total (Bs)', 'Tipo'];
    const csvRows = [headers.join(';')];

    currentSalesData.forEach(s => {
      const isRes  = s.description && s.description.toLowerCase().includes('reserva');
      const tipo   = isRes ? 'Reserva' : 'POS';
      const fecha  = new Date(s.sale_date).toLocaleString('es-BO');
      const detalle = (s.description || 'Venta general').replace(/"/g, '""');
      const rowData = [
        `#${s.id}`,
        fecha,
        s.admin_name || '',
        `"${detalle}"`,
        parseFloat(s.total_amount).toFixed(2),
        tipo
      ];
      csvRows.push(rowData.join(';'));
    });

    const BOM = '\uFEFF';
    const csvContent = BOM + csvRows.join('\n');
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `finanzas_${date}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
