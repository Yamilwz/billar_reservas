<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billar Hall  Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-bg">

<div class="auth-card">
  <div class="auth-logo"> BILLAR HALL</div>
  <p class="auth-subtitle">Tu salón de billar premium</p>
  <h2 class="auth-title mb-1">Bienvenido de vuelta</h2>
  <p class="auth-subtitle mb-4" style="margin-top:2px">Ingresa tus credenciales para continuar</p>

  <div id="loginError" class="alert-dark-danger mb-3 d-none"></div>

  <form id="loginForm">
    <div class="mb-3">
      <label class="form-label">Correo Electrónico</label>
      <input type="email" id="email" class="form-control-dark w-100" placeholder="tu@email.com" required>
    </div>
    <div class="mb-4">
      <label class="form-label">Contraseña</label>
      <input type="password" id="password" class="form-control-dark w-100" placeholder="" required>
    </div>
    <button type="submit" id="loginBtn" class="btn-primary-custom w-100">
      Entrar
    </button>
  </form>

  <div class="text-center mt-4" style="font-size:.88rem; color:var(--text-400)">
    ¿No tienes cuenta? <a href="/register.html" style="color:var(--primary); text-decoration:none; font-weight:600">Regístrate aquí</a>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    err.classList.add('d-none');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verificando...';

    try {
      const data = await api.auth.login({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = data.user.role === 'admin' ? '/admin_reservations.html' : '/index.html';
    } catch (error) {
      err.textContent = ' ' + error.message;
      err.classList.remove('d-none');
      btn.disabled = false;
      btn.innerHTML = 'Entrar';
    }
  });
</script>
</body>
</html>
