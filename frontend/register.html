<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billar Hall  Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-bg">

<div class="auth-card">
  <div class="auth-logo"> BILLAR HALL</div>
  <p class="auth-subtitle">Tu salón de billar premium</p>
  <h2 class="auth-title mb-1">Crear cuenta</h2>
  <p class="auth-subtitle mb-4" style="margin-top:2px">Regístrate para reservar tus mesas</p>

  <div id="regError"   class="alert-dark-danger  mb-3 d-none"></div>
  <div id="regSuccess" class="alert-dark-success mb-3 d-none"></div>

  <form id="regForm">
    <div class="mb-3">
      <label class="form-label">Nombre completo</label>
      <input type="text" id="name" class="form-control-dark w-100" placeholder="Tu nombre" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Correo Electrónico</label>
      <input type="email" id="email" class="form-control-dark w-100" placeholder="tu@email.com" required>
    </div>
    <div class="mb-4">
      <label class="form-label">Contraseña</label>
      <input type="password" id="password" class="form-control-dark w-100" placeholder="Mínimo 6 caracteres" required>
    </div>
    <button type="submit" id="regBtn" class="btn-primary-custom w-100">
      Registrarse
    </button>
  </form>

  <div class="text-center mt-4" style="font-size:.88rem; color:var(--text-400)">
    ¿Ya tienes cuenta? <a href="/login.html" style="color:var(--primary); text-decoration:none; font-weight:600">Inicia sesión</a>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('regError');
    const ok  = document.getElementById('regSuccess');
    const btn = document.getElementById('regBtn');
    err.classList.add('d-none');
    ok.classList.add('d-none');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registrando...';

    try {
      await api.auth.register({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      ok.textContent = ' ¡Cuenta creada! Redirigiendo...';
      ok.classList.remove('d-none');
      setTimeout(() => window.location.href = '/login.html', 1500);
    } catch (error) {
      err.textContent = ' ' + error.message;
      err.classList.remove('d-none');
      btn.disabled = false;
      btn.innerHTML = 'Registrarse';
    }
  });
</script>
</body>
</html>
