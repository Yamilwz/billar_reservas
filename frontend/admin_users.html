<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Usuarios Registrados</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navPlaceholder"></div>

<div class="page-hero">
  <div class="container-fluid px-4">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
      <div>
        <h1 class="page-title">Usuarios Registrados</h1>
        <p class="page-subtitle mt-1">Listado de todos los clientes del sistema</p>
      </div>
      <div class="d-flex gap-3 align-items-center">
        <input type="text" id="searchInput" class="form-control-dark" placeholder="Buscar usuario..." oninput="filterUsers()" style="min-width:220px">
        <span id="totalBadge" class="badge-custom" style="font-size:.95rem;padding:8px 16px">0 usuarios</span>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid px-4 py-4">

  <!-- KPIs -->
  <div class="row g-3 mb-4">
    <div class="col-md-4 col-6">
      <div class="kpi-card green">
        <div class="kpi-value" id="kpiTotal">0</div>
        <div class="kpi-label">Total usuarios</div>
      </div>
    </div>
    <div class="col-md-4 col-6">
      <div class="kpi-card gold">
        <div class="kpi-value" id="kpiClientes">0</div>
        <div class="kpi-label">Clientes</div>
      </div>
    </div>
    <div class="col-md-4 col-6">
      <div class="kpi-card blue">
        <div class="kpi-value" id="kpiAdmins">0</div>
        <div class="kpi-label">Administradores</div>
      </div>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="admin-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Rol</th>
          <th>Registrado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="usersBody">
        <tr><td colspan="6" class="text-center py-4" style="color:var(--text-400)">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  checkAuth('admin');
  document.getElementById('navPlaceholder').innerHTML = renderAdminNav('admin_users');

  let allUsers = [];

  async function loadUsers() {
    try {
      allUsers = await api.users.getAll();
      renderUsers(allUsers);
      updateKpis(allUsers);
    } catch (e) {
      document.getElementById('usersBody').innerHTML =
        `<tr><td colspan="5" class="text-center py-4"><div class="alert-dark-danger d-inline-block">${e.message}</div></td></tr>`;
    }
  }

  function updateKpis(users) {
    const admins  = users.filter(u => u.role === 'admin').length;
    const clients = users.length - admins;
    document.getElementById('kpiTotal').textContent   = users.length;
    document.getElementById('kpiClientes').textContent = clients;
    document.getElementById('kpiAdmins').textContent  = admins;
    document.getElementById('totalBadge').textContent = `${users.length} usuarios`;
  }

  function renderUsers(users) {
    const tbody = document.getElementById('usersBody');
    tbody.innerHTML = '';
    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5" style="color:var(--text-400)">Sin coincidencias</td></tr>';
      return;
    }
    users.forEach((u, i) => {
      const isAdmin = u.role === 'admin';
      const roleBadge = isAdmin
        ? `<span class="badge-custom" style="color:var(--gold);border-color:rgba(255,193,7,.3);background:rgba(255,193,7,.08)">Admin</span>`
        : `<span class="badge-custom badge-completada">Cliente</span>`;
      const date = u.created_at ? new Date(u.created_at).toLocaleDateString('es-BO') : '—';
      const btnDelete = isAdmin ? '' : `<button class="btn btn-sm btn-danger px-2 py-1" onclick="deleteUser(${u.id})" title="Eliminar usuario">🗑</button>`;
      tbody.innerHTML += `
        <tr>
          <td style="color:var(--text-400);font-size:.8rem">${i + 1}</td>
          <td style="font-weight:600">${u.name}</td>
          <td style="font-size:.88rem;color:var(--text-200)">${u.email}</td>
          <td>${roleBadge}</td>
          <td style="font-size:.82rem;color:var(--text-400)">${date}</td>
          <td>${btnDelete}</td>
        </tr>`;
    });
  }

  function filterUsers() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderUsers(allUsers.filter(u =>
      u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
    ));
  }

  async function deleteUser(id) {
    if (!confirm('¿Estás seguro de eliminar este usuario? Sus reservas también se eliminarán.')) return;
    try {
      await api.users.delete(id);
      loadUsers(); // recargar
    } catch (e) {
      alert(e.message);
    }
  }

  loadUsers();
</script>
</body>
</html>
