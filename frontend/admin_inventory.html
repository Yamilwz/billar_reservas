<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin  Inventario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navPlaceholder"></div>

<div class="page-hero">
  <div class="container-fluid px-4">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
      <div>
        <h1 class="page-title">Inventario de Productos</h1>
        <p class="page-subtitle mt-1">Gestiona el stock de bebidas, snacks y más</p>
      </div>
      <button class="btn-primary-custom" onclick="openProductModal()">
        Nuevo Producto
      </button>
    </div>
  </div>
</div>

<div class="container-fluid px-4 py-4">
  <!-- Search bar -->
  <div class="date-filter-bar mb-4">
    
    <input type="text" id="searchInput" class="form-control-dark flex-grow-1" placeholder="Buscar producto..." oninput="filterProducts()">
  </div>

  <div class="table-wrapper">
    <table class="admin-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Producto</th>
          <th>Descripción</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="prodBody">
        <tr><td colspan="6" class="text-center py-4" style="color:var(--text-400)">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Product Modal -->
<div class="modal fade" id="prodModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="prodModalTitle">Nuevo Producto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="prodForm">
          <input type="hidden" id="prodId">
          <div class="mb-3">
            <label class="form-label">Nombre del Producto</label>
            <input type="text" id="pName" class="form-control-dark w-100" placeholder="Ej: Cerveza Paceña 710ml" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea id="pDesc" class="form-control-dark w-100" rows="2" placeholder="Descripción breve..."></textarea>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">Precio (Bs)</label>
              <input type="number" id="pPrice" class="form-control-dark w-100" step="0.01" placeholder="0.00" required>
            </div>
            <div class="col-6">
              <label class="form-label">Stock (unidades)</label>
              <input type="number" id="pStock" class="form-control-dark w-100" placeholder="0" required>
            </div>
          </div>
          <button type="submit" id="prodSaveBtn" class="btn-primary-custom w-100 mt-4">
            Guardar Producto
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  checkAuth('admin');
  document.getElementById('navPlaceholder').innerHTML = renderAdminNav('admin_inventory');
  const modal = new bootstrap.Modal(document.getElementById('prodModal'));
  let allProducts = [];

  async function loadProducts() {
    try {
      allProducts = await api.products.getAll();
      renderProducts(allProducts);
    } catch (e) { alert(e.message); }
  }

  function renderProducts(products) {
    const tbody = document.getElementById('prodBody');
    tbody.innerHTML = '';
    if (products.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5" style="color:var(--text-400)">No hay productos</td></tr>';
      return;
    }
    products.forEach(p => {
      const stockClass = p.stock < 5 ? 'stock-low' : 'stock-ok';
      const stockIcon  = p.stock < 5 ? 'bi-exclamation-triangle' : 'bi-check-circle';
      tbody.innerHTML += `
        <tr>
          <td style="color:var(--text-400);font-size:.8rem">#${p.id}</td>
          <td style="font-weight:600">${p.name}</td>
          <td style="font-size:.82rem;color:var(--text-400)">${p.description || ''}</td>
          <td style="color:var(--gold);font-weight:700">Bs ${parseFloat(p.price).toFixed(2)}</td>
          <td><span class="${stockClass}">${p.stock} ud.</span></td>
          <td>
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-secondary" onclick="editProduct(${p.id})">
                
              </button>
              <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">
                
              </button>
            </div>
          </td>
        </tr>`;
    });
  }

  function filterProducts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q)));
  }

  function openProductModal() {
    document.getElementById('prodForm').reset();
    document.getElementById('prodId').value = '';
    document.getElementById('prodModalTitle').innerHTML = 'Nuevo Producto';
    modal.show();
  }

  function editProduct(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    document.getElementById('prodId').value  = p.id;
    document.getElementById('pName').value   = p.name;
    document.getElementById('pDesc').value   = p.description;
    document.getElementById('pPrice').value  = p.price;
    document.getElementById('pStock').value  = p.stock;
    document.getElementById('prodModalTitle').innerHTML = 'Editar Producto';
    modal.show();
  }

  document.getElementById('prodForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id  = document.getElementById('prodId').value;
    const btn = document.getElementById('prodSaveBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando...';
    const data = {
      name: document.getElementById('pName').value,
      description: document.getElementById('pDesc').value,
      price: document.getElementById('pPrice').value,
      stock: document.getElementById('pStock').value
    };
    try {
      if (id) { await api.products.update(id, data); }
      else     { await api.products.create(data); }
      modal.hide();
      loadProducts();
    } catch (e) { alert(e.message); }
    finally {
      btn.disabled = false;
      btn.innerHTML = 'Guardar Producto';
    }
  });

  async function deleteProduct(id) {
    if (!confirm('¿Eliminar este producto del inventario?')) return;
    try { await api.products.delete(id); loadProducts(); }
    catch (e) { alert(e.message); }
  }

  loadProducts();
</script>
</body>
</html>
